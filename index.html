    function getOrInitApp(cfg) {
        const existing = (firebase.apps || []).find(a => a && a.name === cfg.appName);
        if (existing) { LOG(`Dùng lại Firebase app "${cfg.appName}".`); return existing; }
        try {

            LOG(`Khởi tạo Firebase app: ${cfg.appName}`);
            return a;
        } catch (e) { ERR(`Lỗi khởi tạo "${cfg.appName}":`, e); return null; }
    }

    function waitFirebaseReady(cb) {
        let tries = 0;
        const t = setInterval(() => {
            tries++;
            if (window.firebase && firebase.initializeApp && firebase.database) {
                clearInterval(t); LOG(`Firebase compat sẵn sàng (${tries*100}ms).`); cb();
            } else if (tries % 20 === 0) {
                WARN(`Đang chờ Firebase compat... (${tries/10}s)`);
            }
            if (tries >= 200) { clearInterval(t); ERR('Firebase compat không tải được sau 20s.'); }
        }, 100);
    }

    function rtdbToArray(data) {
        if (!data) return [];
        if (Array.isArray(data)) return data.filter(x => x !== null && x !== undefined);
        if (typeof data === 'object') {
            return Object.keys(data).map(k => {
                const v = data[k];
                if (v && typeof v === 'object' && !Array.isArray(v)) return { _key: k, ...v };
                return v;
            }).filter(x => x !== null && x !== undefined);
        }
        return [];
    }

    function formatVND(amount) {

    }

    function nzLower(s) { return (s || '').toString().trim().toLowerCase(); }

    function escapeHtml(s) {
        if (s === null || s === undefined) return '';
        return String(s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // ⭐ Tạo key ngày hôm nay dạng YYYY-MM-DD (dùng cho localStorage)
    function todayKey() {

    // ⭐ Đọc / ghi / dọn localStorage an toàn (Safari Private mode có thể fail)
    function lsGet(key) {
        try { return localStorage.getItem(key); } catch (e) { return null; }
    }
    function lsSet(key, value) {
        try { localStorage.setItem(key, value); return true; } catch (e) { WARN('localStorage không khả dụng:', e); return false; }
    }
    function cleanupOldStorage() {
        try {
            const today = todayKey();
            const toRemove = [];
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k && k.startsWith(LS_PREFIX) && !k.includes(today)) {
                    toRemove.push(k);
                }
            }
            toRemove.forEach(k => localStorage.removeItem(k));
            if (toRemove.length > 0) LOG(`Đã dọn ${toRemove.length} entry localStorage cũ.`);
        } catch (e) { /* ignore */ }
    }

        // ============================================================

        function loadAllData() {
            LOG('Đang tải dữ liệu từ 2 Firebase...');
            return Promise.all([
                dbTbkh.ref('customerManagement/customers').once('value'),
                dbIdeco.ref('orders/current').once('value'),
                dbIdeco.ref('orders/previous').once('value')
            ]).then(([tbkhSnap, curSnap, prevSnap]) => {
                const tbkhCustomers  = rtdbToArray(tbkhSnap.val());
                const currentOrders  = rtdbToArray(curSnap.val());
                const previousOrders = rtdbToArray(prevSnap.val());
                LOG(`Đã tải: ${tbkhCustomers.length} KH (TBKH), ${currentOrders.length} đơn kỳ này, ${previousOrders.length} đơn kỳ trước.`);
                return { tbkhCustomers, currentOrders, previousOrders };
            });
        }

        // ============================================================
        // PHÂN TÍCH
        // ============================================================
        function analyze(data) {
            const { tbkhCustomers, currentOrders, previousOrders } = data;

            const sumByName = (orders) => {
                const r = {};
                orders.forEach(o => {
                    if (!o || !o.customer) return;
                    const key = nzLower(o.customer);
                    r[key] = (r[key] || 0) + (Number(o.total) || 0);
                });
                return r;
            };
            const currentMap  = sumByName(currentOrders);
            const previousMap = sumByName(previousOrders);

            const findRevenue = (customer, map) => {
                const nameLower = nzLower(customer.name);
                if (!nameLower) return 0;
                if (map[nameLower] !== undefined) return map[nameLower];
                for (const k in map) {
                    if (k.includes(nameLower) || nameLower.includes(k)) return map[k];
                }
                return 0;
            };

            const buildRecommendation = (current, previous) => {
                let growth = 0;
                if (previous > 0) growth = ((current - previous) / previous) * 100;
                else if (current > 0) growth = 100;

                if (current === 0 && previous === 0)
                    return { rec: '🆕 KH mới - Cần tiếp cận',   status: 'status-warning' };
                if (current === 0)
                    return { rec: '📞 Mất đơn - Cần gọi gấp',   status: 'status-bad' };
                if (growth < -50)
                    return { rec: '⚠️ Giảm mạnh - Cần gặp',     status: 'status-bad' };
                if (growth < 0)
                    return { rec: '📉 Giảm - Cần hỗ trợ',        status: 'status-warning' };
                if (growth < 20)
                    return { rec: '📊 Tăng thấp - Đẩy mạnh',    status: 'status-warning' };
                return     { rec: '📈 Tăng tốt - Duy trì',       status: 'status-good' };
            };

            const staffNames = [...new Set(
                tbkhCustomers
                    .map(c => c && c.staff ? c.staff.trim() : '')
                    .filter(Boolean)
            )].sort((a, b) => a.localeCompare(b, 'vi'));

            const staffGroups = [];
            let totalAll = 0, totalBad = 0, totalWarning = 0, totalGood = 0;

            staffNames.forEach(staff => {
                const staffLower = staff.toLowerCase();
                const list = tbkhCustomers
                    .filter(c =>
                        c &&
                        (c.staff ? c.staff.trim().toLowerCase() : '') === staffLower &&
                        !c.ordered && !c.medicineOrdered
                    )
                    .map(c => {
                        const current  = findRevenue(c, currentMap);
                        const previous = findRevenue(c, previousMap);
                        const { rec, status } = buildRecommendation(current, previous);
                        return {
                            code:    c.code    || '',
                            name:    c.name    || '',
                            contact: c.contact || c.contactPerson || '',
                            phone:   c.phone   || '',
                            current, previous,
                            recommendation: rec,
                            statusClass: status
                        };
                    });

                if (list.length === 0) return;

                const order = { 'status-bad': 0, 'status-warning': 1, 'status-good': 2 };
                list.sort((a, b) => {
                    const d = (order[a.statusClass] ?? 9) - (order[b.statusClass] ?? 9);
                    if (d !== 0) return d;
                    return (b.previous + b.current) - (a.previous + a.current);
                });
                list.forEach((r, i) => r.stt = i + 1);

                const stats = {
                    total:   list.length,
                    bad:     list.filter(r => r.statusClass === 'status-bad').length,
                    warning: list.filter(r => r.statusClass === 'status-warning').length,
                    good:    list.filter(r => r.statusClass === 'status-good').length
                };
                totalAll += stats.total; totalBad += stats.bad;
                totalWarning += stats.warning; totalGood += stats.good;

                staffGroups.push({ staff, list, stats });
            });

            return {
                staffGroups,
                summary: {
                    totalStaff: staffGroups.length,
                    total:   totalAll,
                    bad:     totalBad,
                    warning: totalWarning,
                    good:    totalGood
                }
            };
        }

                    </div>

                        <div class="stat-lbl">CẦN GỌI GẤP</div>
                    </div>
                    <div class="stat-item s-good">
                        <div class="stat-num">${summary.good}</div>
                        <div class="stat-lbl">DUY TRÌ TỐT</div>
                    </div>
                </div>
            `;

            if (staffGroups.length === 0) {
                container.innerHTML = `<div class="empty">🎉 Tuyệt vời! Tất cả nhân viên đã hoàn thành đặt hàng cho khách.</div>`;
                return;
            }

            container.innerHTML = staffGroups.map(g => `
                <div class="staff-section">
                    <h4 class="staff-title">👤 Nhân viên: ${escapeHtml(g.staff)}</h4>
                    <div class="staff-summary">
                        Bạn còn <strong>${g.stats.total}</strong> khách hàng chưa đặt hàng
                        ${g.stats.bad > 0     ? `&nbsp;|&nbsp; <span class="status-bad">🔴 ${g.stats.bad} cần gọi gấp</span>` : ''}
                        ${g.stats.warning > 0 ? `&nbsp;|&nbsp; <span class="status-warning">🟠 ${g.stats.warning} cần hỗ trợ</span>` : ''}
                        ${g.stats.good > 0    ? `&nbsp;|&nbsp; <span class="status-good">🟢 ${g.stats.good} duy trì tốt</span>` : ''}
                    </div>
                    <table class="kh-list">
                        <thead>
                            <tr>
                                <th style="width:50px;">STT</th>
                                <th style="width:90px;">Mã KH</th>
                                <th>Tên khách hàng</th>
                                <th style="width:140px;">Người liên hệ</th>
                                <th style="width:120px;">Điện thoại</th>
                                <th style="width:130px;">DS tháng trước</th>
                                <th style="width:130px;">DS kỳ tháng trước đó nữa</th>
                                <th style="width:180px;">Khuyến nghị</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${g.list.map(r => `
                                <tr>
                                    <td class="stt">${r.stt}</td>
                                    <td class="code">${escapeHtml(r.code) || '—'}</td>
                                    <td class="name">${escapeHtml(r.name) || '—'}</td>
                                    <td class="ct">${escapeHtml(r.contact) || '—'}</td>
                                    <td class="phone">${escapeHtml(r.phone) || '—'}</td>
                                    <td class="money ${r.current === 0 ? 'zero' : ''}">${formatVND(r.current)}</td>
                                    <td class="money ${r.previous === 0 ? 'zero' : ''}">${formatVND(r.previous)}</td>
                                    <td class="${r.statusClass}">${r.recommendation}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `).join('');
        }

        function showError(msg) {
            const stats     = shadowRoot.getElementById('statsPanel');
            const container = shadowRoot.getElementById('staffContainer');
            stats.innerHTML = `<p style="color:#c0392b;font-weight:bold;">⚠️ ${escapeHtml(msg)}</p>`;
            container.innerHTML = '';
        }

        // ============================================================
        function showPopup() {
            shadowRoot.getElementById('snoozePopup').style.display = 'none';
            shadowRoot.getElementById('overlay').style.display     = 'block';
            shadowRoot.getElementById('mainPopup').style.display   = 'flex';
            if (popupDisplayTime === null) popupDisplayTime = Date.now();
        }
        function showSnooze()  { shadowRoot.getElementById('snoozePopup').style.display = 'flex'; }
        function closeSnooze() { shadowRoot.getElementById('snoozePopup').style.display = 'none'; LOG('Tiếp tục tính thời gian đọc...'); }

        function handleClose() {
            if (shadowRoot.getElementById('mainPopup').style.display !== 'flex') return;
            if (!popupDisplayTime) {
                shadowRoot.getElementById('overlay').style.display   = 'none';
                shadowRoot.getElementById('mainPopup').style.display = 'none';
                return;
            }
            const elapsed = (Date.now() - popupDisplayTime) / 1000;
            if (elapsed < MIN_READ_TIME_SECONDS) {
                LOG(`Đóng quá nhanh (${elapsed.toFixed(1)}s) → nhắc lại.`);
                showSnooze();
            } else {
                LOG(`Xem đủ ${elapsed.toFixed(1)}s → đóng hoàn toàn.`);
                shadowRoot.getElementById('overlay').style.display     = 'none';
                shadowRoot.getElementById('mainPopup').style.display   = 'none';
                shadowRoot.getElementById('snoozePopup').style.display = 'none';

                // ⭐ Ghi localStorage: máy này đã đọc mốc này hôm nay
                if (lastDisplayedTime) {
                    const key = `${LS_PREFIX}${todayKey()}_${lastDisplayedTime}`;
                    if (lsSet(key, Date.now().toString())) {
                        LOG(`Ghi localStorage: ${key} → sẽ không hiện lại hôm nay.`);
                    }
                }
                popupDisplayTime = null;
            }
        }

        // ============================================================
        // ⭐ CƠ CHẾ LỊCH + BÙ GIỜ
        // ============================================================
        function checkPendingReminder() {
            if (!shadowRoot) return;
            if (shadowRoot.getElementById('mainPopup').style.display === 'flex') return;

            const now = new Date();
            const dow = now.getDay();
            if (!popupSchedule.days.includes(dow)) {
                LOG(`Hôm nay (thứ ${dow}) không trong lịch hiển thị.`);
                return;
            }

            const nowMin = now.getHours() * 60 + now.getMinutes();

            // Tìm mốc gần nhất đã qua TRONG cửa sổ bù
            // Sắp xếp giảm dần để lấy mốc gần nhất trước
            const sortedTimes = [...popupSchedule.times].sort(
                (a, b) => (b.hour * 60 + b.minute) - (a.hour * 60 + a.minute)
            );

            let slot = null, slotStr = null, minutesLate = 0;
            for (const t of sortedTimes) {
                const tm = t.hour * 60 + t.minute;
                const diff = nowMin - tm;
                if (diff >= 0 && diff <= LATE_TOLERANCE_MINUTES) {
                    slot = t;
                    slotStr = `${String(t.hour).padStart(2,'0')}:${String(t.minute).padStart(2,'0')}`;
                    minutesLate = diff;
                    break;
                }
            }

            if (!slot) {
                LOG(`Không có mốc nào trong cửa sổ bù ${LATE_TOLERANCE_MINUTES}p (now=${now.toLocaleTimeString('vi-VN')}).`);
                return;
            }

            // ⭐ Kiểm tra localStorage: máy này đã đóng popup mốc này hôm nay chưa?
            const lsKey = `${LS_PREFIX}${todayKey()}_${slotStr}`;
            if (lsGet(lsKey)) {
                LOG(`Mốc ${slotStr}: máy này đã đọc xong hôm nay (localStorage), bỏ qua.`);
                lastDisplayedTime = slotStr; // chốt biến RAM để không kiểm tra lặp lại trong phiên
                return;
            }

            if (slotStr === lastDisplayedTime) {
                LOG(`Mốc ${slotStr} đang/đã xử lý trong phiên này, bỏ qua.`);
                return;
            }

            LOG(`📢 Kích hoạt popup mốc ${slotStr} - bù ${minutesLate}p (now=${now.toLocaleTimeString('vi-VN')}).`);
            loadAllData()
                .then(data => {
                    const { staffGroups, summary } = analyze(data);
                    if (staffGroups.length === 0) {
                        LOG('Không có nhân viên nào còn KH chưa đặt → bỏ qua popup, ghi nhận mốc.');
                        lastDisplayedTime = slotStr;
                        // Cũng ghi localStorage để máy này không kiểm tra lại
                        lsSet(lsKey, Date.now().toString());
                        return;
                    }
                    render(staffGroups, summary, slotStr, minutesLate);
                    showPopup();
                    lastDisplayedTime = slotStr;
                    LOG(`Đã hiển thị popup: ${staffGroups.length} nhân viên, ${summary.total} khách hàng.`);
                })
                .catch(err => {
                    ERR('Lỗi tải dữ liệu:', err);
                    showError('Không thể kết nối Firebase: ' + (err.message || err));
                    showPopup();
                });
        }

        // ============================================================
        function init() {
            const appTbkh  = getOrInitApp(FIREBASE_TBKH);
            const appIdeco = getOrInitApp(FIREBASE_IDECO);
            if (!appTbkh || !appIdeco) { ERR('Không khởi tạo được Firebase.'); return; }
            dbTbkh  = firebase.database(appTbkh);
            dbIdeco = firebase.database(appIdeco);

            cleanupOldStorage();
            createDOM();

            LOG('=== POPUP TỔNG HỢP v3.1 (BÙ GIỜ + localStorage) ===');
            LOG('Lịch:', popupSchedule.times.map(t =>
                `${String(t.hour).padStart(2,'0')}:${String(t.minute).padStart(2,'0')}`
            ).join(', '));
            LOG(`Cửa sổ bù: ${LATE_TOLERANCE_MINUTES} phút sau mốc thiết lập.`);

            checkPendingReminder();
            setInterval(checkPendingReminder, CHECK_INTERVAL_MS);
        }

        return { init };
    })();

    // ================================================================
    // KHỞI CHẠY
    // ================================================================
    function bootstrap() {
        waitFirebaseReady(() => {
            try { PopupApp.init(); }
            catch (e) { ERR('Bootstrap lỗi:', e); }
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', bootstrap);
    } else {
        bootstrap();
    }
})();
</script>
